name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Download Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH
      
      - name: Generate Gradle Wrapper
        run: |
          gradle-8.4/bin/gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: corteno-iptv-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: corteno-iptv-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
